<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividades</title>
    <link rel="icon" type="image/png" href="https://i.pinimg.com/736x/c5/67/57/c56757ecd67c88d0b9fcd50efb46c6d5.jpg">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ══ LAYOUT ══ */
        .act-page { padding: 2px 300px; }

        .act-header {
            display: flex; align-items: center; margin-bottom: 24px;
        }
        .back-btn {
            width: 36px; height: 36px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; transition: background 0.2s;
            flex-shrink: 0; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); }
        .act-title-row {
            display: flex; align-items: center; gap: 10px;
            flex: 1; justify-content: center;
        }
        .act-title { font-size: 32px; font-weight: 700; color: #fff; font-family: 'Inter', sans-serif; }
        .spacer { width: 36px; flex-shrink: 0; }

        /* ══ CARD BASE (igual a passwords) ══ */
        .act-card {
            border-radius: 14px; padding: 16px 20px;
            position: relative; border: 1px solid rgba(255,255,255,0.13);
            margin-bottom: 12px; overflow: hidden;
        }
        .act-card::before {
            content: ''; position: absolute; inset: 0; border-radius: inherit;
            background: rgba(255,255,255,0.073);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            z-index: 0;
            box-shadow: inset 2px 2px 0px -2px rgba(255,255,255,0.7),
                        inset 0 0 3px 1px rgba(255,255,255,0.1);
        }
        .act-card > * { position: relative; z-index: 1; }

        /* ══ SELECTOR DE MES ══ */
        .mes-nav {
            display: flex; align-items: center; justify-content: center;
            gap: 16px; margin-bottom: 20px;
        }
        .mes-nav-btn {
            width: 34px; height: 34px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            color: #fff; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: background 0.2s; font-family: 'Inter', sans-serif;
        }
        .mes-nav-btn:hover { background: rgba(255,255,255,0.12); }
        .mes-label {
            font-family: 'Inter', sans-serif; font-size: 20px;
            font-weight: 700; color: #fff; min-width: 200px; text-align: center;
        }

        /* ══ DRIVE LINK ══ */
        .drive-card {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 20px; text-decoration: none;
            padding: 14px 20px; cursor: pointer;
        }
        .drive-icon {
            width: 40px; height: 40px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .drive-info { flex: 1; min-width: 0; }
        .drive-label {
            font-family: 'Inter', sans-serif; font-size: 15px;
            font-weight: 600; color: #fff;
        }
        .drive-url {
            font-family: 'Inter', sans-serif; font-size: 12px;
            color: rgba(255,255,255,0.4); overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap; margin-top: 2px;
        }
        .drive-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .drive-edit-btn, .drive-open-btn {
            padding: 7px 14px; border-radius: 8px; font-family: 'Inter', sans-serif;
            font-size: 13px; font-weight: 600; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.15); transition: background 0.2s;
        }
        .drive-edit-btn { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7); }
        .drive-edit-btn:hover { background: rgba(255,255,255,0.13); }
        .drive-open-btn { background: rgba(144,174,234,0.15); color: #90AEEA; border-color: rgba(144,174,234,0.3); }
        .drive-open-btn:hover { background: rgba(144,174,234,0.25); }
        .drive-sin-link {
            font-family: 'Inter', sans-serif; font-size: 14px;
            color: rgba(255,255,255,0.4); font-style: italic;
        }

        /* ══ SECCIÓN TÍTULO ══ */
        .sec-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .sec-title {
            font-family: 'Inter', sans-serif; font-size: 16px;
            font-weight: 700; color: #fff;
        }
        .sec-count {
            font-family: 'Inter', sans-serif; font-size: 13px;
            color: rgba(255,255,255,0.4);
        }

        .act-cols {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
            margin-bottom: 20px;
        }
        .act-col-title {
            font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700;
            color: rgba(255,255,255,0.5); text-transform: uppercase;
            letter-spacing: 0.5px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }
        .act-col-title span {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .dot-pendiente { background: #e0a83d; }
        .dot-completada { background: #6fcf97; }

        /* ══ TARJETA DE ACTIVIDAD ══ */
        .actividad-card {
            border-radius: 12px; padding: 14px 16px;
            position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 8px; transition: opacity 0.2s;
        }
        .actividad-card::before {
            content: ''; position: absolute; inset: 0; border-radius: inherit;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 0;
        }
        .actividad-card > * { position: relative; z-index: 1; }
        .actividad-card.completada::before { background: rgba(111,207,151,0.06); }
        .actividad-card.completada { border-color: rgba(111,207,151,0.2); }

        .act-card-top {
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 8px; margin-bottom: 6px;
        }
        .act-card-titulo {
            font-family: 'Inter', sans-serif; font-size: 15px;
            font-weight: 700; color: #fff; line-height: 1.3;
        }
        .actividad-card.completada .act-card-titulo {
            text-decoration: line-through; color: rgba(255,255,255,0.5);
        }
        .act-card-badges { display: flex; gap: 6px; flex-shrink: 0; }
        .badge {
            font-family: 'Inter', sans-serif; font-size: 10.5px; font-weight: 700;
            padding: 2px 8px; border-radius: 20px; text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .badge-general { background: rgba(144,174,234,0.18); color: #90AEEA; }
        .badge-individual { background: rgba(224,168,61,0.18); color: #e0a83d; }
        .badge-completada { background: rgba(111,207,151,0.18); color: #6fcf97; }

        .act-card-fecha {
            font-family: 'Inter', sans-serif; font-size: 12px;
            color: rgba(255,255,255,0.4); margin-bottom: 6px;
        }
        .act-card-desc {
            font-family: 'Inter', sans-serif; font-size: 13.5px;
            color: rgba(255,255,255,0.65); line-height: 1.5; margin-bottom: 10px;
        }
        .act-card-link {
            display: inline-flex; align-items: center; gap: 5px;
            font-family: 'Inter', sans-serif; font-size: 12.5px;
            color: #90AEEA; text-decoration: none; margin-bottom: 10px;
            transition: opacity 0.2s;
        }
        .act-card-link:hover { opacity: 0.75; }
        .act-card-footer {
            display: flex; gap: 8px; justify-content: flex-end;
        }
        .act-btn {
            padding: 5px 12px; border-radius: 7px; font-family: 'Inter', sans-serif;
            font-size: 12.5px; font-weight: 600; cursor: pointer; border: none;
            transition: background 0.2s;
        }
        .act-btn-completar {
            background: rgba(111,207,151,0.14); color: #6fcf97;
            border: 1px solid rgba(111,207,151,0.3);
        }
        .act-btn-completar:hover { background: rgba(111,207,151,0.25); }
        .act-btn-descompletar {
            background: rgba(224,168,61,0.12); color: #e0a83d;
            border: 1px solid rgba(224,168,61,0.3);
        }
        .act-btn-descompletar:hover { background: rgba(224,168,61,0.22); }
        .act-btn-eliminar {
            background: rgba(220,80,80,0.1); color: #e05252;
            border: 1px solid rgba(220,80,80,0.25);
        }
        .act-btn-eliminar:hover { background: rgba(220,80,80,0.2); }

        .act-empty {
            font-family: 'Inter', sans-serif; font-size: 13.5px;
            color: rgba(255,255,255,0.3); font-style: italic;
            text-align: center; padding: 24px 0;
        }

        /* ══ BOTÓN NUEVA ACTIVIDAD ══ */
        .btn-nueva-act {
            width: 100%; padding: 13px; border-radius: 12px;
            background: rgba(144,174,234,0.12); border: 1px solid rgba(144,174,234,0.3);
            color: #90AEEA; font-family: 'Inter', sans-serif;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: background 0.2s; margin-bottom: 24px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-nueva-act:hover { background: rgba(144,174,234,0.2); }

        /* ══ BOTÓN REPORTE ══ */
        .btn-reporte {
            width: 36px; height: 36px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: rgba(255,255,255,0.7);
            transition: background 0.2s; flex-shrink: 0;
        }
        .btn-reporte:hover { background: rgba(255,255,255,0.12); color: #fff; }

        /* ══ DIÁLOGO NUEVA ACTIVIDAD ══ */
        .nueva-act-backdrop {
            display: none; position: fixed; inset: 0; z-index: 3000;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            align-items: center; justify-content: center; padding: 20px;
            box-sizing: border-box;
        }
        .nueva-act-backdrop.open { display: flex; }
        .nueva-act-dialog {
            width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
            background: rgba(20,17,18,0.92); border: 1px solid rgba(255,255,255,0.13);
            border-radius: 22px; padding: 26px; color: #fff;
            font-family: 'Inter', sans-serif; box-shadow: 0 24px 60px rgba(0,0,0,0.6);
            scrollbar-width: none;
        }
        .nueva-act-dialog::-webkit-scrollbar { display: none; }
        .nad-title { font-size: 22px; font-weight: 700; margin: 0 0 20px; }
        .nad-label { font-size: 13.5px; font-weight: 700; color: #fff; margin: 0 0 7px; }
        .nad-input, .nad-textarea, .nad-select {
            width: 100%; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 11px;
            padding: 12px 14px; color: #fff; font-family: 'Inter', sans-serif;
            font-size: 14.5px; outline: none; box-sizing: border-box;
            transition: border-color 0.2s; margin-bottom: 14px;
        }
        .nad-input:focus, .nad-textarea:focus, .nad-select:focus {
            border-color: rgba(255,255,255,0.3);
        }
        .nad-input::placeholder, .nad-textarea::placeholder { color: rgba(255,255,255,0.3); }
        .nad-textarea { resize: none; min-height: 80px; }
        .nad-select { appearance: none; cursor: pointer; }
        .nad-select option { background: #1a1718; }
        .nad-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .nad-actions { display: flex; gap: 10px; margin-top: 6px; }
        .nad-btn {
            flex: 1; padding: 12px; border-radius: 12px; font-family: 'Inter', sans-serif;
            font-size: 14.5px; font-weight: 600; cursor: pointer; border: none;
            transition: background 0.2s;
        }
        .nad-btn-cancel { background: rgba(255,255,255,0.1); color: #fff; }
        .nad-btn-cancel:hover { background: rgba(255,255,255,0.16); }
        .nad-btn-save { background: #1a3a5c; color: #fff; border: 1px solid rgba(100,160,230,0.3); }
        .nad-btn-save:hover { background: #1e4570; }

        /* ══ DIÁLOGO DRIVE LINK ══ */
        .drive-dialog-backdrop {
            display: none; position: fixed; inset: 0; z-index: 3000;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            align-items: center; justify-content: center; padding: 20px;
        }
        .drive-dialog-backdrop.open { display: flex; }
        .drive-dialog {
            width: 100%; max-width: 440px;
            background: rgba(20,17,18,0.92); border: 1px solid rgba(255,255,255,0.13);
            border-radius: 20px; padding: 24px; color: #fff;
            font-family: 'Inter', sans-serif; box-shadow: 0 24px 60px rgba(0,0,0,0.6);
        }
        .dd-title { font-size: 20px; font-weight: 700; margin: 0 0 16px; }

        /* ══ LOADING ══ */
        .act-loading {
            text-align: center; padding: 48px 0;
            font-family: 'Inter', sans-serif; font-size: 14px;
            color: rgba(255,255,255,0.35); font-style: italic;
        }

        /* ══ RESPONSIVE ══ */
        @media (max-width: 1200px) { .act-page { padding: 2px 80px; } }
        @media (max-width: 900px) { .act-page { padding: 2px 24px; } }
        @media (max-width: 640px) {
            .act-page { padding: 2px 14px; }
            .act-cols { grid-template-columns: 1fr; }
            .act-title { font-size: 24px; }
            .nad-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- Diálogo nueva actividad -->
<div class="nueva-act-backdrop" id="nueva-act-backdrop">
    <div class="nueva-act-dialog">
        <h2 class="nad-title">Nueva Actividad</h2>
        <div class="nad-label">Título</div>
        <input type="text" class="nad-input" id="nad-titulo" placeholder="Ej: Reunión coordinación semestral">
        <div class="nad-label">Descripción</div>
        <textarea class="nad-textarea" id="nad-desc" placeholder="Detalles de la actividad..."></textarea>
        <div class="nad-row">
            <div>
                <div class="nad-label">Fecha</div>
                <input type="date" class="nad-input" id="nad-fecha">
            </div>
            <div>
                <div class="nad-label">Visibilidad</div>
                <select class="nad-select" id="nad-tipo">
                    <option value="general">General (todos lo ven)</option>
                    <option value="individual">Individual (solo yo)</option>
                </select>
            </div>
        </div>
        <div class="nad-label">Link de Google Drive (opcional)</div>
        <input type="url" class="nad-input" id="nad-link" placeholder="https://drive.google.com/...">
        <div class="nad-actions">
            <button class="nad-btn nad-btn-cancel" onclick="cerrarNuevaAct()">Cancelar</button>
            <button class="nad-btn nad-btn-save" onclick="guardarActividad()">Guardar</button>
        </div>
    </div>
</div>

<!-- Diálogo Drive link del mes -->
<div class="drive-dialog-backdrop" id="drive-dialog-backdrop">
    <div class="drive-dialog">
        <h2 class="dd-title">Link de Google Drive</h2>
        <div class="nad-label">Etiqueta</div>
        <input type="text" class="nad-input" id="dd-etiqueta" placeholder="Ej: Materiales Junio 2026">
        <div class="nad-label">URL de Google Drive</div>
        <input type="url" class="nad-input" id="dd-url" placeholder="https://drive.google.com/...">
        <div class="nad-actions">
            <button class="nad-btn nad-btn-cancel" onclick="cerrarDriveDialog()">Cancelar</button>
            <button class="nad-btn nad-btn-save" onclick="guardarDriveLink()">Guardar</button>
        </div>
    </div>
</div>

<div class="act-page">
    <div class="act-header">
        <a href="index.html" class="back-btn" title="Volver">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <div class="act-title-row">
            <img src="img/Actividades.webp" alt="" style="width:28px;height:28px;object-fit:contain;">
            <span class="act-title">Actividades</span>
        </div>
        <button class="btn-reporte" id="btn-reporte" title="Descargar reporte TXT">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
    </div>

    <!-- Navegación de mes -->
    <div class="mes-nav">
        <button class="mes-nav-btn" id="btn-mes-prev" onclick="cambiarMes(-1)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="mes-label" id="mes-label">—</span>
        <button class="mes-nav-btn" id="btn-mes-next" onclick="cambiarMes(1)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
    </div>

    <!-- Link Google Drive del mes -->
    <div class="act-card drive-card" id="drive-card" onclick="abrirDriveLink()">
        <div class="drive-icon">
            <svg width="32" height="32" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg">
                <path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
                <path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="#00ac47"/>
                <path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="#ea4335"/>
                <path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/>
                <path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/>
                <path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 27h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
            </svg>
        </div>
        <div class="drive-info">
            <div class="drive-label" id="drive-label">Cargando...</div>
            <div class="drive-url" id="drive-url-text">—</div>
        </div>
        <div class="drive-actions" id="drive-actions" onclick="event.stopPropagation()"></div>
    </div>

    <!-- Contenido del mes -->
    <div id="act-contenido">
        <div class="act-loading">Cargando actividades...</div>
    </div>

    <!-- Botón nueva actividad (solo admins) -->
    <button class="btn-nueva-act" id="btn-nueva-act" style="display:none;" onclick="abrirNuevaAct()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nueva Actividad
    </button>
</div>

<script>
/* ══ SUPABASE ══ */
const SUPABASE_URL = 'https://nwjcuosceidgnfyfeuqe.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_H95FvNeaJdxrWTAJElW-FA_K_thenik';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let isAdmin = false;
let mesActual = new Date().getMonth() + 1;  // 1-12
let anioActual = new Date().getFullYear();
let driveLink = null;
let actividades = [];

const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
               'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

/* ══ AUTH ══ */
async function initAuth() {
    const { data: { session } } = await sb.auth.getSession();
    currentUser = session?.user || null;
    if (currentUser) {
        const { data } = await sb.from('admins').select('email').eq('email', currentUser.email).maybeSingle();
        isAdmin = !!data;
    }
    document.getElementById('btn-nueva-act').style.display = isAdmin ? 'flex' : 'none';
    cargarMes();
}

sb.auth.onAuthStateChange((_e, session) => {
    currentUser = session?.user || null;
    initAuth();
});

/* ══ MES ══ */
function actualizarLabelMes() {
    document.getElementById('mes-label').textContent = `${MESES[mesActual-1]} ${anioActual}`;
}

function cambiarMes(dir) {
    mesActual += dir;
    if (mesActual > 12) { mesActual = 1; anioActual++; }
    if (mesActual < 1)  { mesActual = 12; anioActual--; }
    actualizarLabelMes();
    cargarMes();
}

async function cargarMes() {
    actualizarLabelMes();
    document.getElementById('act-contenido').innerHTML = '<div class="act-loading">Cargando actividades...</div>';

    await Promise.all([cargarDriveLink(), cargarActividades()]);
    renderActividades();
}

/* ══ DRIVE LINK ══ */
async function cargarDriveLink() {
    const { data } = await sb.from('drive_links')
        .select('*').eq('anio', anioActual).eq('mes', mesActual).maybeSingle();
    driveLink = data || null;
    renderDriveCard();
}

function renderDriveCard() {
    const label = document.getElementById('drive-label');
    const urlText = document.getElementById('drive-url-text');
    const actions = document.getElementById('drive-actions');
    const card = document.getElementById('drive-card');

    if (driveLink) {
        label.textContent = driveLink.etiqueta || 'Carpeta de Drive';
        urlText.textContent = driveLink.url;
        card.onclick = () => window.open(driveLink.url, '_blank');
        card.style.cursor = 'pointer';
    } else {
        label.innerHTML = '<span class="drive-sin-link">Sin link de Drive para este mes</span>';
        urlText.textContent = 'Haz clic en "Editar" para añadir uno';
        card.onclick = isAdmin ? abrirDriveDialog : null;
        card.style.cursor = isAdmin ? 'pointer' : 'default';
    }

    actions.innerHTML = isAdmin ? `
        <button class="drive-edit-btn" onclick="event.stopPropagation();abrirDriveDialog()">Editar</button>
        ${driveLink ? `<button class="drive-open-btn" onclick="event.stopPropagation();window.open('${driveLink.url}','_blank')">Abrir</button>` : ''}
    ` : (driveLink ? `<button class="drive-open-btn" onclick="event.stopPropagation();window.open('${driveLink.url}','_blank')">Abrir</button>` : '');
}

function abrirDriveDialog() {
    document.getElementById('dd-etiqueta').value = driveLink?.etiqueta || '';
    document.getElementById('dd-url').value = driveLink?.url || '';
    document.getElementById('drive-dialog-backdrop').classList.add('open');
}
function cerrarDriveDialog() {
    document.getElementById('drive-dialog-backdrop').classList.remove('open');
}
async function guardarDriveLink() {
    const etiqueta = document.getElementById('dd-etiqueta').value.trim() || 'Carpeta de Drive';
    const url = document.getElementById('dd-url').value.trim();
    if (!url) { alert('Ingresa una URL de Google Drive.'); return; }
    const payload = { anio: anioActual, mes: mesActual, etiqueta, url, updated_at: new Date().toISOString() };
    const { error } = await sb.from('drive_links').upsert(payload, { onConflict: 'anio,mes' });
    if (error) { console.error(error); alert('Error guardando el link.'); return; }
    cerrarDriveDialog();
    await cargarDriveLink();
}

/* ══ ACTIVIDADES ══ */
async function cargarActividades() {
    const primerDia = `${anioActual}-${String(mesActual).padStart(2,'0')}-01`;
    const ultimoDia = new Date(anioActual, mesActual, 0);
    const ultimoDiaStr = `${anioActual}-${String(mesActual).padStart(2,'0')}-${String(ultimoDia.getDate()).padStart(2,'0')}`;

    const { data, error } = await sb.from('actividades')
        .select('*')
        .gte('fecha', primerDia)
        .lte('fecha', ultimoDiaStr)
        .order('fecha');

    if (error) { console.error(error); actividades = []; return; }
    actividades = data || [];
}

function formatFecha(fechaStr) {
    const [y,m,d] = fechaStr.split('-');
    return `${d} de ${MESES[parseInt(m)-1]} de ${y}`;
}

function renderActividades() {
    const pendientes = actividades.filter(a => !a.completada);
    const completadas = actividades.filter(a => a.completada);

    const renderCard = (a) => {
        const puedeGestionar = isAdmin;
        return `
        <div class="actividad-card ${a.completada ? 'completada' : ''}" id="act-${a.id}">
            <div class="act-card-top">
                <div class="act-card-titulo">${a.titulo}</div>
                <div class="act-card-badges">
                    <span class="badge ${a.tipo === 'general' ? 'badge-general' : 'badge-individual'}">
                        ${a.tipo === 'general' ? 'General' : 'Individual'}
                    </span>
                    ${a.completada ? '<span class="badge badge-completada">✓ Hecha</span>' : ''}
                </div>
            </div>
            <div class="act-card-fecha">${formatFecha(a.fecha)}</div>
            ${a.descripcion ? `<div class="act-card-desc">${a.descripcion}</div>` : ''}
            ${a.link_drive ? `<a href="${a.link_drive}" target="_blank" class="act-card-link">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                Ver en Drive
            </a>` : ''}
            ${puedeGestionar ? `<div class="act-card-footer">
                ${a.completada
                    ? `<button class="act-btn act-btn-descompletar" onclick="toggleCompletada('${a.id}', false)">↩ Pendiente</button>`
                    : `<button class="act-btn act-btn-completar" onclick="toggleCompletada('${a.id}', true)">✓ Completar</button>`
                }
                <button class="act-btn act-btn-eliminar" onclick="eliminarActividad('${a.id}')">✕ Eliminar</button>
            </div>` : ''}
        </div>`;
    };

    const html = `
        <div class="sec-header">
            <span class="sec-title">Actividades del mes</span>
            <span class="sec-count">${actividades.length} en total</span>
        </div>
        <div class="act-cols">
            <div>
                <div class="act-col-title"><span class="dot-pendiente"></span>Pendientes (${pendientes.length})</div>
                ${pendientes.length > 0
                    ? pendientes.map(renderCard).join('')
                    : '<div class="act-empty">Sin actividades pendientes</div>'}
            </div>
            <div>
                <div class="act-col-title"><span class="dot-completada"></span>Completadas (${completadas.length})</div>
                ${completadas.length > 0
                    ? completadas.map(renderCard).join('')
                    : '<div class="act-empty">Ninguna completada aún</div>'}
            </div>
        </div>`;

    document.getElementById('act-contenido').innerHTML = html;
}

async function toggleCompletada(id, completada) {
    const { error } = await sb.from('actividades').update({ completada }).eq('id', id);
    if (error) { console.error(error); return; }
    const idx = actividades.findIndex(a => a.id === id);
    if (idx !== -1) actividades[idx].completada = completada;
    renderActividades();
}

async function eliminarActividad(id) {
    if (!confirm('¿Eliminar esta actividad? Esta acción no se puede deshacer.')) return;
    const { error } = await sb.from('actividades').delete().eq('id', id);
    if (error) { console.error(error); return; }
    actividades = actividades.filter(a => a.id !== id);
    renderActividades();
}

/* ══ NUEVA ACTIVIDAD ══ */
function abrirNuevaAct() {
    document.getElementById('nad-titulo').value = '';
    document.getElementById('nad-desc').value = '';
    document.getElementById('nad-link').value = '';
    document.getElementById('nad-tipo').value = 'general';
    // Fecha por defecto: hoy (dentro del mes actual si es posible)
    const hoy = new Date();
    const fechaDefault = hoy.getFullYear() === anioActual && hoy.getMonth() + 1 === mesActual
        ? hoy.toISOString().slice(0,10)
        : `${anioActual}-${String(mesActual).padStart(2,'0')}-01`;
    document.getElementById('nad-fecha').value = fechaDefault;
    document.getElementById('nueva-act-backdrop').classList.add('open');
}
function cerrarNuevaAct() {
    document.getElementById('nueva-act-backdrop').classList.remove('open');
}

async function guardarActividad() {
    const titulo = document.getElementById('nad-titulo').value.trim();
    const desc = document.getElementById('nad-desc').value.trim();
    const fecha = document.getElementById('nad-fecha').value;
    const tipo = document.getElementById('nad-tipo').value;
    const link = document.getElementById('nad-link').value.trim();

    if (!titulo) { alert('El título es obligatorio.'); return; }
    if (!fecha) { alert('La fecha es obligatoria.'); return; }

    const payload = {
        titulo, descripcion: desc || null, fecha, tipo,
        creador_email: currentUser?.email || '',
        creador_nombre: currentUser?.user_metadata?.full_name || currentUser?.email || 'Admin',
        link_drive: link || null,
    };

    const { data, error } = await sb.from('actividades').insert(payload).select().single();
    if (error) { console.error(error); alert('Error guardando la actividad.'); return; }

    // Solo añadir al array local si está dentro del mes visible
    const [y,m] = fecha.split('-');
    if (parseInt(y) === anioActual && parseInt(m) === mesActual) {
        actividades.push(data);
        actividades.sort((a,b) => a.fecha.localeCompare(b.fecha));
        renderActividades();
    }
    cerrarNuevaAct();
}

/* ══ REPORTE TXT ══ */
document.getElementById('btn-reporte').addEventListener('click', () => {
    const mesNombre = MESES[mesActual-1];
    let txt = `REPORTE DE ACTIVIDADES — ${mesNombre.toUpperCase()} ${anioActual}\n`;
    txt += '═'.repeat(50) + '\n\n';

    if (actividades.length === 0) {
        txt += 'No hay actividades registradas para este mes.\n';
    } else {
        const pendientes = actividades.filter(a => !a.completada);
        const completadas = actividades.filter(a => a.completada);

        if (pendientes.length > 0) {
            txt += `PENDIENTES (${pendientes.length})\n${'─'.repeat(30)}\n`;
            pendientes.forEach(a => {
                txt += `\n● ${a.titulo}\n`;
                txt += `  Fecha: ${formatFecha(a.fecha)}\n`;
                txt += `  Tipo: ${a.tipo === 'general' ? 'General' : 'Individual'}\n`;
                if (a.descripcion) txt += `  Descripción: ${a.descripcion}\n`;
                if (a.link_drive) txt += `  Drive: ${a.link_drive}\n`;
            });
        }

        if (completadas.length > 0) {
            txt += `\nCOMPLETADAS (${completadas.length})\n${'─'.repeat(30)}\n`;
            completadas.forEach(a => {
                txt += `\n✓ ${a.titulo}\n`;
                txt += `  Fecha: ${formatFecha(a.fecha)}\n`;
                txt += `  Tipo: ${a.tipo === 'general' ? 'General' : 'Individual'}\n`;
                if (a.descripcion) txt += `  Descripción: ${a.descripcion}\n`;
                if (a.link_drive) txt += `  Drive: ${a.link_drive}\n`;
            });
        }
    }

    txt += `\n${'═'.repeat(50)}\n`;
    txt += `Generado el ${new Date().toLocaleDateString('es-CO', {timeZone:'America/Bogota'})} a las `;
    txt += `${new Date().toLocaleTimeString('es-CO', {timeZone:'America/Bogota',hour:'2-digit',minute:'2-digit'})}\n`;

    const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Actividades_${mesNombre}_${anioActual}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
});

/* Cerrar diálogos con clic en backdrop */
document.getElementById('nueva-act-backdrop').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) cerrarNuevaAct();
});
document.getElementById('drive-dialog-backdrop').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) cerrarDriveDialog();
});

initAuth();
</script>
